<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Time Forum</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main id="app">
    <section class="auth-layout">
      <div class="card main-card">
        <h1>Real Time Forum</h1>
        <p id="auth-status">Checking session...</p>

        <div id="guest-view" class="hidden">
          <div class="tabs">
            <button id="show-login-btn" class="tab-btn active" type="button">Login</button>
            <button id="show-register-btn" class="tab-btn" type="button">Register</button>
          </div>

          <form id="login-form" class="form">
            <h2>Login</h2>

            <label>
              Nickname or Email
              <input type="text" id="login-identifier" required>
            </label>

            <label>
              Password
              <input type="password" id="login-password" required>
            </label>

            <button type="submit">Login</button>
          </form>

          <form id="register-form" class="form hidden">
            <h2>Register</h2>

            <label>
              Nickname
              <input type="text" id="register-nickname" required>
            </label>

            <label>
              Age
              <input type="number" id="register-age" required>
            </label>

            <label>
              Gender
              <input type="text" id="register-gender" required>
            </label>

            <label>
              First Name
              <input type="text" id="register-first-name" required>
            </label>

            <label>
              Last Name
              <input type="text" id="register-last-name" required>
            </label>

            <label>
              Email
              <input type="email" id="register-email" required>
            </label>

            <label>
              Password
              <input type="password" id="register-password" required>
            </label>

            <button type="submit">Register</button>
          </form>
        </div>

        <div id="user-view" class="hidden">
          <h2>Welcome, <span id="current-user-nickname"></span></h2>
          <p>You are logged in.</p>
          <button id="logout-btn" type="button">Logout</button>

          <section class="forum-layout">
            <section class="card forum-card">
              <h3>Create Post</h3>

              <form id="create-post-form" class="form">
                <label>
                  Title
                  <input type="text" id="post-title" required>
                </label>

                <label>
                  Content
                  <textarea id="post-content" rows="5" required></textarea>
                </label>

                <label>
                  Categories
                  <input type="text" id="post-categories" placeholder="Example: general, go, school" required>
                </label>

                <button type="submit">Create Post</button>
              </form>
            </section>

            <section class="card forum-card">
              <h3>Feed</h3>
              <div id="posts-feed"></div>

              <section id="comments-panel" class="comments-panel hidden">
                <div class="comments-header">
                  <h3 id="comments-post-title">Comments</h3>
                  <button id="close-comments-btn" type="button">Close</button>
                </div>

                <div id="comments-list"></div>

                <form id="create-comment-form" class="form">
                  <label>
                    Add Comment
                    <textarea id="comment-content" rows="3" required></textarea>
                  </label>

                  <button type="submit">Comment</button>
                </form>
              </section>
            </section>
          </section>
        </div>

        <p id="message"></p>
      </div>
    </section>
  </main>

  <script src="/static/js/app.js?v=6"></script>
</body>
</html>
